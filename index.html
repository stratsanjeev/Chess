<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional JavaScript Chess Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Chess Sandbox</h1>
    <div id="status">White's Turn</div>

    <div class="chessboard" id="board">
        <div class="square light black-piece" data-row="0" data-col="0">♜</div>
        <div class="square dark black-piece" data-row="0" data-col="1">♞</div>
        <div class="square light black-piece" data-row="0" data-col="2">♝</div>
        <div class="square dark black-piece" data-row="0" data-col="3">♛</div>
        <div class="square light black-piece" data-row="0" data-col="4">♚</div>
        <div class="square dark black-piece" data-row="0" data-col="5">♝</div>
        <div class="square light black-piece" data-row="0" data-col="6">♞</div>
        <div class="square dark black-piece" data-row="0" data-col="7">♜</div>

        <div class="square dark black-piece" data-row="1" data-col="0">♟</div>
        <div class="square light black-piece" data-row="1" data-col="1">♟</div>
        <div class="square dark black-piece" data-row="1" data-col="2">♟</div>
        <div class="square light black-piece" data-row="1" data-col="3">♟</div>
        <div class="square dark black-piece" data-row="1" data-col="4">♟</div>
        <div class="square light black-piece" data-row="1" data-col="5">♟</div>
        <div class="square dark black-piece" data-row="1" data-col="6">♟</div>
        <div class="square light black-piece" data-row="1" data-col="7">♟</div>

        <div class="square light" data-row="2" data-col="0"></div>
        <div class="square dark" data-row="2" data-col="1"></div>
        <div class="square light" data-row="2" data-col="2"></div>
        <div class="square dark" data-row="2" data-col="3"></div>
        <div class="square light" data-row="2" data-col="4"></div>
        <div class="square dark" data-row="2" data-col="5"></div>
        <div class="square light" data-row="2" data-col="6"></div>
        <div class="square dark" data-row="2" data-col="7"></div>

        <div class="square dark" data-row="3" data-col="0"></div>
        <div class="square light" data-row="3" data-col="1"></div>
        <div class="square dark" data-row="3" data-col="2"></div>
        <div class="square light" data-row="3" data-col="3"></div>
        <div class="square dark" data-row="3" data-col="4"></div>
        <div class="square light" data-row="3" data-col="5"></div>
        <div class="square dark" data-row="3" data-col="6"></div>
        <div class="square light" data-row="3" data-col="7"></div>

        <div class="square light" data-row="4" data-col="0"></div>
        <div class="square dark" data-row="4" data-col="1"></div>
        <div class="square light" data-row="4" data-col="2"></div>
        <div class="square dark" data-row="4" data-col="3"></div>
        <div class="square light" data-row="4" data-col="4"></div>
        <div class="square dark" data-row="4" data-col="5"></div>
        <div class="square light" data-row="4" data-col="6"></div>
        <div class="square dark" data-row="4" data-col="7"></div>

        <div class="square dark" data-row="5" data-col="0"></div>
        <div class="square light" data-row="5" data-col="1"></div>
        <div class="square dark" data-row="5" data-col="2"></div>
        <div class="square light" data-row="5" data-col="3"></div>
        <div class="square dark" data-row="5" data-col="4"></div>
        <div class="square light" data-row="5" data-col="5"></div>
        <div class="square dark" data-row="5" data-col="6"></div>
        <div class="square light" data-row="5" data-col="7"></div>

        <div class="square light white-piece" data-row="6" data-col="0">♙</div>
        <div class="square dark white-piece" data-row="6" data-col="1">♙</div>
        <div class="square light white-piece" data-row="6" data-col="2">♙</div>
        <div class="square dark white-piece" data-row="6" data-col="3">♙</div>
        <div class="square light white-piece" data-row="6" data-col="4">♙</div>
        <div class="square dark white-piece" data-row="6" data-col="5">♙</div>
        <div class="square light white-piece" data-row="6" data-col="6">♙</div>
        <div class="square dark white-piece" data-row="6" data-col="7">♙</div>

        <div class="square dark white-piece" data-row="7" data-col="0">♖</div>
        <div class="square light white-piece" data-row="7" data-col="1">♘</div>
        <div class="square dark white-piece" data-row="7" data-col="2">♗</div>
        <div class="square light white-piece" data-row="7" data-col="3">♕</div>
        <div class="square dark white-piece" data-row="7" data-col="4">♔</div>
        <div class="square light white-piece" data-row="7" data-col="5">♗</div>
        <div class="square dark white-piece" data-row="7" data-col="6">♘</div>
        <div class="square light white-piece" data-row="7" data-col="7">♖</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
